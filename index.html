<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語 穴埋め小テスト（中学〜高校1年）</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem 4rem; }
  .wrap { max-width: 700px; margin: 0 auto; }
  /* Word List */
  .wordlist-toggle { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 0.5px solid #e0dfd8; border-radius: 10px; padding: 0.85rem 1.25rem; cursor: pointer; margin-bottom: 1rem; user-select: none; }
  .wordlist-toggle:hover { background: #faf9f6; }
  .wl-title { font-size: 14px; font-weight: 500; }
  .wl-count { font-size: 12px; color: #888780; margin-left: 8px; }
  .wl-arrow { font-size: 12px; color: #888780; transition: transform 0.25s; }
  .wl-arrow.open { transform: rotate(180deg); }
  .wordlist-body { display: none; background: #fff; border: 0.5px solid #e0dfd8; border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .wordlist-body.open { display: block; }
  .wl-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .wl-tab { font-size: 12px; padding: 4px 12px; border: 0.5px solid #e0dfd8; border-radius: 20px; cursor: pointer; background: #f5f4f0; color: #6b6b68; transition: all 0.15s; }
  .wl-tab.active { background: #378ADD; border-color: #378ADD; color: #fff; }
  .wl-section { display: none; }
  .wl-section.active { display: block; }
  .wl-cat-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 0.5px solid #e0dfd8; }
  .wl-cat-name { font-size: 13px; font-weight: 500; color: #1a1a18; }
  .wl-cat-count { font-size: 11px; color: #888780; }
  .wl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 2px 8px; }
  .wl-item { font-size: 12px; padding: 4px 0; display: flex; gap: 6px; align-items: baseline; border-bottom: 0.5px solid #f0efe8; }
  .wl-word { font-weight: 500; color: #1a1a18; min-width: 82px; flex-shrink: 0; }
  .wl-ja { color: #888780; font-size: 11px; }
  .wl-hs { display: inline-block; width: 6px; height: 6px; background: #378ADD; border-radius: 50%; margin-left: 2px; vertical-align: middle; flex-shrink: 0; }
  .wl-legend { font-size: 11px; color: #888780; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
  /* Quiz */
  .quiz-header { margin-bottom: 1.25rem; }
  .quiz-title { font-size: 20px; font-weight: 500; }
  .quiz-sub { font-size: 13px; color: #6b6b68; margin-top: 4px; }
  .progress-bg { height: 4px; background: #dddcd6; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 4px; background: #378ADD; border-radius: 2px; transition: width 0.4s ease; }
  .card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .q-num { font-size: 11px; font-weight: 500; color: #378ADD; letter-spacing: 0.06em; margin-bottom: 10px; }
  .q-sentence { font-size: 17px; font-weight: 500; line-height: 1.7; margin-bottom: 6px; }
  .blank { display: inline-block; border-bottom: 2px solid #378ADD; min-width: 90px; text-align: center; color: #378ADD; font-weight: 500; padding: 0 6px; }
  .blank.correct { color: #3B6D11; border-color: #639922; }
  .blank.wrong   { color: #A32D2D; border-color: #E24B4A; }
  .translation { font-size: 13px; color: #6b6b68; margin-bottom: 12px; line-height: 1.5; }
  .hint { font-size: 12px; color: #888780; background: #f5f4f0; border-radius: 6px; padding: 6px 10px; margin-bottom: 14px; line-height: 1.6; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .choice-btn { background: #f5f4f0; border: 0.5px solid #dddcd6; border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #1a1a18; cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s; font-family: inherit; }
  .choice-btn:hover:not(.disabled) { background: #fff; border-color: #b4b2a9; }
  .choice-btn.correct  { background: #EAF3DE; border-color: #639922; color: #3B6D11; cursor: default; }
  .choice-btn.wrong    { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; cursor: default; }
  .choice-btn.disabled { cursor: default; }
  .feedback { display: none; font-size: 13px; margin-top: 12px; padding: 8px 12px; border-radius: 6px; line-height: 1.7; }
  .feedback.show { display: block; }
  .feedback.correct { background: #EAF3DE; color: #3B6D11; }
  .feedback.wrong   { background: #FCEBEB; color: #A32D2D; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .q-counter { font-size: 13px; color: #6b6b68; }
  .btn { background: transparent; border: 0.5px solid #b4b2a9; border-radius: 8px; padding: 8px 18px; font-size: 14px; color: #1a1a18; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn:hover:not(:disabled) { background: #f5f4f0; }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary { background: #378ADD; border-color: #378ADD; color: #fff; }
  .btn.primary:hover:not(:disabled) { background: #185FA5; border-color: #185FA5; }
  .result-card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 2rem 1.5rem; text-align: center; }
  .score-big { font-size: 52px; font-weight: 500; color: #378ADD; line-height: 1; }
  .score-denom { font-size: 22px; color: #b4b2a9; }
  .score-pct { font-size: 14px; color: #6b6b68; margin-top: 6px; margin-bottom: 1rem; }
  .score-msg { font-size: 14px; line-height: 1.7; margin-bottom: 1.5rem; }
  .review-list { text-align: left; }
  .review-item { padding: 10px 0; border-top: 0.5px solid #e0dfd8; font-size: 13px; color: #6b6b68; line-height: 1.7; }
  .review-row { display: flex; align-items: flex-start; gap: 8px; }
  .mark { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 3px; }
  .mark.ok { background: #EAF3DE; color: #3B6D11; }
  .mark.ng { background: #FCEBEB; color: #A32D2D; }
  .ans-correct { color: #3B6D11; font-weight: 500; }
  .ans-wrong   { color: #A32D2D; }
  .restart-btn { margin-top: 1.5rem; padding: 10px 24px; font-size: 14px; }
  @media (max-width: 480px) { .choices { grid-template-columns: 1fr; } .q-sentence { font-size: 15px; } .wl-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); } }
  .footer-note {
    position: fixed; bottom: 0; right: 0; left: 0;
    background: rgba(245,244,240,0.92);
    backdrop-filter: blur(4px);
    border-top: 0.5px solid #e0dfd8;
    padding: 6px 16px;
    font-size: 11px;
    color: #888780;
    text-align: right;
    line-height: 1.6;
    z-index: 999;
  }

  /* ===== 出席番号選択 ===== */
  .ss-title { font-size:20px; font-weight:500; margin-bottom:6px; }
  .ss-sub   { font-size:13px; color:#6b6b68; margin-bottom:1.5rem; }
  .ss-grid  { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:1.5rem; }
  .ss-btn   { background:#fff; border:0.5px solid #dddcd6; border-radius:8px; padding:14px 0;
              font-size:16px; font-weight:500; color:#1a1a18; cursor:pointer; text-align:center;
              transition:all 0.15s; }
  .ss-btn:hover  { background:#EBF3FC; border-color:#378ADD; color:#378ADD; }
  .ss-btn.sel    { background:#378ADD; border-color:#378ADD; color:#fff; }
  .ss-start { width:100%; padding:12px; font-size:15px; }
  /* ===== 管理者 ===== */
  #admin-wrap { display:none; }
  .adm-title  { font-size:18px; font-weight:500; }
  .adm-pass   { display:flex; gap:8px; margin-bottom:1rem; }
  .adm-pass input { flex:1; border:0.5px solid #dddcd6; border-radius:8px; padding:8px 12px;
                    font-size:14px; font-family:inherit; outline:none; }
  .adm-pass input:focus { border-color:#378ADD; }
  .adm-tbl  { width:100%; border-collapse:collapse; font-size:13px; }
  .adm-tbl th { background:#f5f4f0; padding:8px 10px; text-align:left;
                border:0.5px solid #e0dfd8; font-size:12px; color:#6b6b68; }
  .adm-tbl td { padding:8px 10px; border:0.5px solid #e0dfd8; vertical-align:top; }
  .adm-tbl tr:nth-child(even) td { background:#faf9f6; }
  .bar-bg   { width:80px; height:6px; background:#e0dfd8; border-radius:3px; display:inline-block; vertical-align:middle; }
  .bar-fill { height:6px; border-radius:3px; display:block; }
  .wrong-txt { font-size:11px; color:#A32D2D; line-height:1.8; }
  .adm-actions { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1rem; }

</style>
</head>
<body>
<!-- ★ 出席番号選択 -->
<div id="ss-wrap" class="wrap">
  <div class="quiz-header">
    <div class="ss-title">英語 穴埋め小テスト</div>
    <div class="ss-sub">出席番号を選んでからスタートしてください</div>
  </div>
  <div class="card">
    <div class="ss-grid" id="ss-grid"></div>
    <button class="btn primary ss-start" id="ss-start-btn" onclick="startQuiz()" disabled>スタート →</button>
  </div>
  <div style="text-align:right;margin-top:10px;">
    <button style="background:none;border:none;color:#378ADD;font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit;" onclick="showAdmin()">管理者ページ</button>
  </div>
</div>

<!-- ★ クイズ画面 -->
<div id="quiz-wrap" class="wrap" style="display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
    <span id="student-badge" style="font-size:13px;font-weight:500;color:#378ADD;"></span>
    <button style="background:none;border:none;font-size:12px;color:#888780;cursor:pointer;font-family:inherit;" onclick="backToSelect()">← 出席番号選択に戻る</button>
  </div>

  <div class="wordlist-toggle" onclick="toggleWordList()">
    <span><span class="wl-title">📚 単語リスト（中学英語）</span><span class="wl-count" id="wl-count"></span></span>
    <span class="wl-arrow" id="wl-arrow">▼</span>
  </div>
  <div class="wordlist-body" id="wordlist-body">
    <div class="wl-tabs" id="wl-tabs"></div>
    <div id="wl-sections"></div>
  </div>

  <div class="quiz-header">
    <div class="quiz-title">英語 穴埋め小テスト</div>
    <div class="quiz-sub">空欄に入る最も適切な語（句）を選んでください・問題は毎回ランダムに出題されます</div>
  </div>
  <div class="progress-bg"><div class="progress-fill" id="prog" style="width:10%"></div></div>
  <div id="quiz-body"></div>
  <div class="nav-row" id="nav-row">
    <button class="btn" id="prev-btn" onclick="move(-1)" disabled>← 前へ</button>
    <span class="q-counter" id="q-counter">1 / 10</span>
    <button class="btn primary" id="next-btn" onclick="move(1)" disabled>次へ →</button>
  </div>
</div>

<!-- ★ 管理者画面 -->
<div id="admin-wrap" class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
    <span class="adm-title">📊 管理者ページ</span>
    <button class="btn" onclick="hideAdmin()">← 生徒画面に戻る</button>
  </div>
  <div id="adm-lock">
    <div style="font-size:13px;color:#6b6b68;margin-bottom:8px;">管理者パスワードを入力してください</div>
    <div class="adm-pass">
      <input type="password" id="adm-pass-inp" placeholder="パスワード" onkeydown="if(event.key==='Enter')unlockAdmin()">
      <button class="btn primary" onclick="unlockAdmin()">確認</button>
    </div>
    <div id="adm-err" style="font-size:12px;color:#A32D2D;display:none;">パスワードが違います</div>
  </div>
  <div id="adm-content" style="display:none;">
    <!-- GAS URL設定 -->
    <div class="card" style="margin-bottom:1rem;">
      <div style="font-size:13px;font-weight:500;margin-bottom:8px;">📡 Googleスプレッドシート連携</div>
      <div style="font-size:12px;color:#6b6b68;margin-bottom:8px;">Apps Script のウェブアプリURLを入力すると、解答結果が自動でスプレッドシートに送信されます。</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec"
          style="flex:1;min-width:200px;border:0.5px solid #dddcd6;border-radius:8px;padding:8px 12px;font-size:12px;font-family:inherit;outline:none;">
        <button class="btn primary" onclick="saveGasUrl()" style="font-size:13px;white-space:nowrap;">保存</button>
        <button class="btn" onclick="testGasUrl()" style="font-size:13px;white-space:nowrap;">テスト送信</button>
      </div>
      <div id="gas-status" style="font-size:12px;margin-top:6px;"></div>
    </div>
    <div class="adm-actions">
      <button class="btn" onclick="exportCSV()">📥 CSVダウンロード</button>
      <button class="btn" onclick="clearData()" style="color:#A32D2D;border-color:#E24B4A;">🗑 全データ削除</button>
    </div>
    <div style="overflow-x:auto;"><table class="adm-tbl" id="adm-tbl"></table></div>
  </div>
</div>

const GAS_KEY = "eq_gas_url";
const GAS_DEFAULT = "https://script.google.com/macros/s/AKfycbzjqVP9lz-E8-IL9XiH8WufMtUgXpK-rqhqpGe2I_ajh9GT9UnPaavW58_URONGr5SLiw/exec";

function getGasUrl() {
  return localStorage.getItem(GAS_KEY) || GAS_DEFAULT;
}

function saveGasUrl() {

  localStorage.setItem(GAS_KEY, url);

  st.style.color = "#639922";

}

function testGasUrl() {
  const url = getGasUrl();
  const st = document.getElementById("gas-status");
  if (!url) { st.style.color="#A32D2D"; st.textContent="⚠️ URLが設定されていません"; return; }
  st.style.color="#6b6b68"; st.textContent="送信中...";
  sendToGas({ student: "テスト", score: 10, total: 10, pct: 100, date: new Date().toLocaleString("ja-JP"), wrong: [] })
    .then(() => { st.style.color="#639922"; st.textContent="✅ テスト送信成功！スプレッドシートを確認してください"; })

function sendToGas(data) {
  const url = getGasUrl();
  if (!url) return Promise.resolve();
  return fetch(url, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

function renderAdminTable() {
  const results = getResults();
  const tbl = document.getElementById("adm-tbl");
  let html = `<thead><tr>
    <th>出席番号</th>
    <th>受験回数</th>
    <th>最新正答率</th>
    <th>平均正答率</th>
    <th>最新の間違い</th>
  </tr></thead><tbody>`;

  for (let i = 1; i <= 25; i++) {
    const records = results[i] || [];
    if (records.length === 0) {
      html += `<tr><td>${i}番</td><td colspan="4" style="color:#aaa;font-size:12px;">未受験</td></tr>`;
      continue;
    }
    const latest = records[records.length - 1];
    const avgPct = Math.round(records.reduce((s, r) => s + r.pct, 0) / records.length);
    const latestPct = latest.pct;
    const color = latestPct >= 80 ? "#639922" : latestPct >= 60 ? "#D97706" : "#A32D2D";
    const barW = latestPct;
    const wrongHtml = latest.wrong.length === 0
      ? '<span style="color:#639922;font-size:12px;">全問正解！</span>'
      : '<div class="wrong-txt">' + latest.wrong.map(w =>
          `<b>${w.answer}</b>（あなた: ${w.selected}）<br><span style="color:#888;font-size:10px;">${w.sentence}</span>`
        ).join('<br>') + '</div>';

    html += `<tr>
      <td style="font-weight:500;">${i}番</td>
      <td style="text-align:center;">${records.length}回</td>
      <td>
        <span style="font-weight:500;color:${color};">${latestPct}%</span>
        <span style="font-size:11px;color:#888;"> (${latest.score}/${latest.total})</span><br>
        <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:${color};"></div></div>
      </td>
      <td style="text-align:center;color:#6b6b68;">${avgPct}%</td>
      <td>${wrongHtml}</td>
    </tr>`;
  }
  html += "</tbody>";
  tbl.innerHTML = html;
}

function exportCSV() {
  const results = getResults();
  const rows = [["出席番号","受験回数","最新正答率(%)","平均正答率(%)","最新の間違い（正答 / 選択）"]];
  for (let i = 1; i <= 25; i++) {
    const records = results[i] || [];
    if (records.length === 0) { rows.push([i+"番","0","","",""]); continue; }
    const latest = records[records.length - 1];
    const avgPct = Math.round(records.reduce((s,r)=>s+r.pct,0)/records.length);
    const wrongStr = latest.wrong.map(w => w.answer + "→" + w.selected).join(" / ");
    rows.push([i+"番", records.length, latest.pct, avgPct, wrongStr]);
  }
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "英語テスト結果_" + new Date().toLocaleDateString("ja-JP").replace(/\//g,"-") + ".csv";
  a.click();
}

function clearData() {
  if (confirm("全員の成績データを削除しますか？")) {
    localStorage.removeItem(STORAGE_KEY);
    renderAdminTable();
  }
}

// ---- 結果保存 ----
function saveStudentResult(score, total, wrongItems) {
  if (!currentStudent) return;
  const results = getResults();
  if (!results[currentStudent]) results[currentStudent] = [];
  const record = {
    date: new Date().toLocaleString("ja-JP"),
    score, total,
    pct: Math.round(score / total * 100),
    wrong: wrongItems
  };
  results[currentStudent].push(record);
  saveResults(results);

  // Googleスプレッドシートへ送信
  sendToGas({
    student: currentStudent + "番",
    score, total,
    pct: record.pct,
    date: record.date,
    wrong: wrongItems.map(w => w.answer + "→" + w.selected + "（" + w.sentence + "）")
  }).catch(() => {}); // 失敗しても無視
}

/* ================================================================
   クイズロジック
   ================================================================ */
const QUIZ_SIZE = 10;
let quizQ=[], shuffledC=[], current=0, selected=[], answered=[];
// selected[i] = [val1, val2]  answered[i] = true when both blanks filled

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function initQuiz() {
  quizQ = shuffle(QUESTION_POOL).slice(0, QUIZ_SIZE);
  shuffledC = quizQ.map(q => q.blanks.map(b => shuffle(b.choices)));
  current=0;
  selected = Array.from({length:QUIZ_SIZE}, ()=>[null,null]);
  answered = new Array(QUIZ_SIZE).fill(false);
  document.getElementById('nav-row').style.display='flex';
  document.getElementById('prog').style.width=(1/QUIZ_SIZE*100)+'%';
  renderQuiz();
}

function renderQuiz() {
  const q=quizQ[current];
  const isAns=answered[current];
  const sel=selected[current];
  document.getElementById('prog').style.width=((current+1)/QUIZ_SIZE*100)+'%';
  document.getElementById('q-counter').textContent=(current+1)+' / '+QUIZ_SIZE;
  document.getElementById('prev-btn').disabled=current===0;
  const nb=document.getElementById('next-btn');
  nb.textContent=current===QUIZ_SIZE-1?'結果を見る →':'次へ →';
  nb.disabled=!isAns;

  // Build sentence with blanks
  const sentenceParts = q.parts.map((p, idx) => {
    if(idx >= q.blanks.length) return p;
    const val = sel[idx];
    const blankTxt = (isAns && val)
      ? `<span class="blank ${val===q.blanks[idx].answer?'correct':'wrong'}">${val}</span>`
      : `<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;
    return p + blankTxt;
  }).join('') + (q.parts.length > q.blanks.length ? '' : '');
  // last part (parts has blanks.length+1 elements)
  const sentenceHTML = q.parts.reduce((acc, part, idx) => {
    if(idx < q.blanks.length){
      const val = sel[idx];
      const blankTxt = (isAns && val)
        ? `<span class="blank ${val===q.blanks[idx].answer?'correct':'wrong'}">${val}</span>`
        : `<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;
      return acc + part + blankTxt;
    }
    return acc + part;
  }, '');

  // Build choice buttons for each blank
  const choicesHTML = q.blanks.map((blank, bi) => {
    const label = q.blanks.length > 1 ? `<div style="font-size:11px;color:#888780;margin-bottom:4px;">空欄${bi+1}</div>` : '';
    const btns = shuffledC[current][bi].map(c => {
      let cls='choice-btn';
      if(isAns){ cls+=' disabled'; if(c===blank.answer) cls+=' correct'; else if(c===sel[bi]) cls+=' wrong'; }
      const safe=c.replace(/&/g,'&amp;').replace(/'/g,'&#39;');
      return `<button class="${cls}" onclick="choose(${bi},'${safe}')">${c}</button>`;
    }).join('');
    return `<div style="margin-bottom:${bi<q.blanks.length-1?'14px':'0'}">${label}<div class="choices">${btns}</div></div>`;
  }).join('');

  // Build feedback
  const fbHTML = isAns ? q.blanks.map((blank, bi) => {
    const ok = sel[bi]===blank.answer;
    return `<div class="feedback show ${ok?'correct':'wrong'}" style="margin-top:${bi===0?'12px':'6px'};">空欄${bi+1}: ${blank.explain}</div>`;
  }).join('') : '<div class="feedback"></div>';

  document.getElementById('quiz-body').innerHTML=`
    <div class="card">
      <div class="q-num">問題 ${current+1} / ${QUIZ_SIZE}</div>
      <div class="q-sentence">${sentenceHTML}</div>
      <div class="translation">🇯🇵 ${q.ja}</div>
      <div class="hint">${q.hint}</div>
      ${choicesHTML}
      ${fbHTML}
    </div>`;
}

function choose(blankIdx, val){
  if(answered[current]) return;
  selected[current][blankIdx] = val;
  // Mark answered when all blanks filled
  if(selected[current].every(v => v !== null)) answered[current] = true;
  renderQuiz();
}

function move(dir){
  const next=current+dir;
  if(next<0)return;
  if(next>=QUIZ_SIZE){showResult();return;}
  current=next; renderQuiz();
}

function showResult(){
  let score=0;
  quizQ.forEach((q,i)=>{
    if(q.blanks.every((b,bi)=>selected[i][bi]===b.answer)) score++;
  });
  const pct=Math.round(score/QUIZ_SIZE*100);

  const wrongItems = quizQ.map((q,i)=>{
    const allOk = q.blanks.every((b,bi)=>selected[i][bi]===b.answer);
    if(allOk) return null;
    const sentence = q.parts.reduce((acc,p,idx)=>acc+p+(idx<q.blanks.length?'[  ]':''),'');
    const wrongDetails = q.blanks.map((b,bi)=>({answer:b.answer, selected:selected[i][bi]||'未回答'}));
    return { answer: q.blanks.map(b=>b.answer).join('・'), selected: wrongDetails.map(w=>w.selected).join('・'), sentence };
  }).filter(Boolean);

  saveStudentResult(score, QUIZ_SIZE, wrongItems);

  const msg=pct===100?'🎉 満点です！素晴らしい実力ですね。全問正解、完璧です！'
    :pct>=80?'👏 よくできました！あと少しで満点です。間違えた問題の解説を確認しましょう。'
    :pct>=60?'📚 まあまあです。間違えた問題の解説をよく読んで復習しましょう。'
    :'💪 もう一度チャレンジしてみましょう！解説を読んでしっかり復習してね。';
  document.getElementById('nav-row').style.display='none';
  document.getElementById('prog').style.width='100%';

  const reviewH=quizQ.map((q,i)=>{
    const allOk=q.blanks.every((b,bi)=>selected[i][bi]===b.answer);
    const answers=q.blanks.map(b=>`<span class="ans-correct">${b.answer}</span>`).join('・');
    const wrongPart=!allOk?` <span class="ans-wrong">（あなたの答え: ${q.blanks.map((b,bi)=>selected[i][bi]||'未回答').join('・')}）</span>`:'';
    const sentence=q.parts.reduce((acc,p,idx)=>acc+p+(idx<q.blanks.length?'['+q.blanks[idx].answer+']':''),'');
    return `<div class="review-item"><div class="review-row"><span class="mark ${allOk?'ok':'ng'}">${allOk?'○':'×'}</span><span><b>問${i+1}.</b> ${sentence}${wrongPart}</span></div></div>`;
  }).join('');

  document.getElementById('quiz-body').innerHTML=`
    <div class="result-card">
      <div class="score-big">${score}<span class="score-denom"> / ${QUIZ_SIZE}</span></div>
      <div class="score-pct">正解率 ${pct}%</div>
      <div class="score-msg">${msg}</div>
      <div class="review-list">${reviewH}</div><br>
      <button class="btn primary restart-btn" onclick="initQuiz()">もう一度挑戦する（問題をランダムに変更）</button>
      <button class="btn restart-btn" onclick="backToSelect()" style="margin-left:8px;">出席番号選択に戻る</button>
    </div>`;
}

  const tabsEl = document.getElementById('wl-tabs');
  const secsEl = document.getElementById('wl-sections');

  secsEl.innerHTML = '';

  cats.forEach((cat, idx) => {
    const tab = document.createElement('div');
    tab.className = 'wl-tab' + (idx === 0 ? ' active' : '');
    tab.textContent = cat;
    tab.onclick = () => {
      document.querySelectorAll('.wl-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.wl-section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('wl-sec-' + idx).classList.add('active');
    };
    tabsEl.appendChild(tab);

    const words = WORD_LIST[cat];
    const sec = document.createElement('div');
    sec.className = 'wl-section' + (idx === 0 ? ' active' : '');
    sec.id = 'wl-sec-' + idx;
    sec.innerHTML = `<div class="wl-cat-header"><span class="wl-cat-name">${cat}</span><span class="wl-cat-count">${words.length}語</span></div>` +
      '<div class="wl-grid">' +
      words.map(w => `<div class="wl-item"><span class="wl-word">${w[0]}</span><span class="wl-ja">${w[1]}</span></div>`).join('') +
      '</div>';
    secsEl.appendChild(sec);
  });
}
